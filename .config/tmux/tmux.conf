# Set prefix to Ctrl Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1              # windows start at 1, more natural
set -g detach-on-destroy off     # don't exit tmux when closing a session
set -g escape-time 0             # important for nvim, removes delay
set -g history-limit 1000000     # more scrollback
set -g renumber-windows on       # keeps window numbers tidy
set -g set-clipboard on          # system clipboard
set -g status-position top       # matter of taste
setw -g mode-keys vi             # vi keys in copy mode

# Image support
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

# Plugin environment location
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'

# Session management
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# vi copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ── Tokyo Night Moon status bar ───────────────────────────────────────────────
set -g status-style          "bg=#222436,fg=#c8d3f5"
set -g status-left-length    500
set -g status-right-length   150

set -g pane-border-style        "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"
set -g message-style            "bg=#2f334d,fg=#c8d3f5"
set -g message-command-style    "bg=#2f334d,fg=#c8d3f5"

# Windows rendered inside #{W} in status-left for full separator control
set -g window-status-format         ""
set -g window-status-current-format ""
set -g window-status-separator      ""

set -g status-left  "#{?client_prefix,#[fg=#1e2030 bg=#c099ff bold]  #S #{?#{==:#{active_window_index},1},#[fg=#c099ff bg=#2d3a6b nobold],#[fg=#c099ff bg=#222436 nobold]},#[fg=#1e2030 bg=#82aaff bold]  #S #{?#{==:#{active_window_index},1},#[fg=#82aaff bg=#2d3a6b nobold],#[fg=#82aaff bg=#222436 nobold]}}#{W:#[fg=#636da6 bg=#222436] #I  #W #{?#{==:#{window_index},#{session_windows}},,#{?#{==:#{e|+:#{window_index},1},#{active_window_index}},,#[fg=#444a73 bg=#222436]}},#{?#{==:#{window_index},1},,#[fg=#222436 bg=#2d3a6b]}#[fg=#82aaff bg=#2d3a6b] #I  #W #{?window_zoomed_flag,  ,}#[fg=#2d3a6b bg=#222436]}"
set -g status-right "#[fg=#2f334d bg=#222436]#[fg=#c8d3f5 bg=#2f334d]  #{b:pane_current_path} #[fg=#82aaff bg=#2f334d]#[fg=#1e2030 bg=#82aaff bold]  %H:%M "

# ── Keybinds ──────────────────────────────────────────────────────────────────
# smart-splits pane navigation (works with Neovim smart-splits.nvim)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind t split-window -v -l 10 -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

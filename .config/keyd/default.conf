# keyd configuration
# Location on the system: /etc/keyd/default.conf
# Tracked copy lives in your dotfiles at ~/.config/keyd/default.conf
# Deploy with:  sudo cp ~/.config/keyd/default.conf /etc/keyd/default.conf && sudo keyd reload

[ids]
*

[main]
# Caps Lock: tap = Escape, hold = Control
capslock = overload(control, esc)

# The real Left Control now behaves as Caps Lock
leftcontrol = capslock

# ISO 102nd key (the <> key): unshifted = backtick
102nd = grave

[shift]
# Shift + 102nd = tilde
102nd = ~

